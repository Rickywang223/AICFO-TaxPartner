<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CFO · 智能税务合伙人</title>
<style>
:root {
    --primary: #1677ff;
    --primary-light: #f0f5ff;
    --primary-border: #d6e4ff;
    --danger: #f5222d;
    --warning: #fa8c16;
    --success: #52c41a;
    --text: #262626;
    --text-secondary: #595959;
    --text-tertiary: #8c8c8c;
    --text-disabled: #bfbfbf;
    --border: #edf0f5;
    --bg: #f5f6fa;
    --bg-card: #fafafa;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
.app { height:100vh; display:flex; flex-direction:column; }
.topbar { height:48px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px; flex-shrink:0; }
.topbar h1 { font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; }
.topbar-actions { display:flex; gap:12px; font-size:12px; color:var(--text-tertiary); }
.topbar-actions span { cursor:pointer; padding:4px 8px; border-radius:4px; transition:all 0.1s; }
.topbar-actions span:hover { background:var(--bg); color:var(--text); }
.main { flex:1; display:flex; overflow:hidden; }

/* Sidebar */
.sidebar { width:220px; background:#fff; border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-scroll { flex:1; overflow-y:auto; padding:12px; }
.sidebar-title { font-size:10px; color:var(--text-disabled); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-weight:500; }
.agent-card { padding:10px; border-radius:8px; margin-bottom:6px; cursor:pointer; transition:all 0.1s; border:1px solid transparent; }
.agent-card:hover { background:var(--bg); }
.agent-card.active { background:var(--primary-light); border-color:var(--primary-border); }
.ac-top { display:flex; align-items:center; gap:6px; }
.ac-icon { font-size:18px; line-height:1; }
.ac-name { font-size:12px; font-weight:600; color:var(--text); }
.ac-badge { font-size:9px; padding:1px 6px; border-radius:3px; margin-left:auto; font-weight:500; }
.badge-urgent { background:#fff1f0; color:var(--danger); }
.badge-warning { background:#fff7e6; color:var(--warning); }
.badge-normal { background:#f6ffed; color:var(--success); }
.badge-idle { background:#f5f5f5; color:var(--text-tertiary); }
.ac-summary { font-size:10px; color:var(--text-tertiary); margin-top:2px; line-height:1.4; }
.sidebar-divider { height:1px; background:var(--border); margin:10px 0; }
.sidebar-footer { padding:0 12px 12px; }
.sf-item { font-size:11px; color:var(--text-secondary); padding:6px 8px; cursor:pointer; border-radius:4px; display:flex; align-items:center; gap:6px; transition:all 0.1s; }
.sf-item:hover { background:var(--bg); color:var(--text); }
.sf-item.highlight { color:var(--primary); }
.sf-item.highlight:hover { background:var(--primary-light); }

/* Chat Area */
.chat-area { flex:1; display:flex; flex-direction:column; background:#fff; }
.chat-header { padding:10px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.chat-header .ch-icon { font-size:16px; }
.chat-header .ch-name { font-size:13px; font-weight:600; }
.chat-header .ch-role { font-size:10px; color:var(--text-tertiary); }
.chat-messages { flex:1; overflow-y:auto; padding:16px 20px; }
.msg { margin-bottom:14px; display:flex; gap:8px; animation:fadeIn 0.2s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.ava-agent { background:var(--primary-light); }
.ava-user { background:var(--bg); }
.msg-body { flex:1; min-width:0; }
.msg-meta { font-size:10px; color:var(--text-disabled); margin-bottom:3px; }
.msg-agent .msg-meta { color:var(--primary); }
.msg-user .msg-meta { text-align:right; }
.msg-text { font-size:12px; line-height:1.7; color:var(--text); white-space:pre-wrap; }
.msg-text strong { font-weight:600; }
.msg-user .msg-text { background:var(--bg); border-radius:8px; padding:8px 12px; display:inline-block; max-width:80%; }

/* Data Cards in Chat */
.chat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin:8px 0; }
.chat-card-header { padding:8px 10px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.chat-card-header:hover { background:#f5f5f5; }
.chat-card-title { font-size:11px; font-weight:600; display:flex; align-items:center; gap:4px; }
.chat-card-toggle { font-size:10px; color:var(--text-disabled); }
.chat-card-body { padding:0 10px 8px; }
.chat-card-summary { font-size:10px; color:var(--text-tertiary); margin-bottom:6px; }
.chat-card-chart { height:80px; border-radius:6px; margin:6px 0; overflow:hidden; position:relative; cursor:pointer; display:flex; align-items:flex-end; gap:4px; padding:0 4px; }
.chart-bar { flex:1; border-radius:3px 3px 0 0; min-height:4px; transition:height 0.3s; position:relative; }
.chart-bar .bar-label { position:absolute; bottom:-14px; left:50%; transform:translateX(-50%); font-size:8px; color:var(--text-disabled); white-space:nowrap; }
.chart-bar .bar-value { position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:8px; font-weight:600; white-space:nowrap; }

/* Action buttons */
.msg-actions { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.btn { font-size:10px; padding:5px 12px; border-radius:5px; cursor:pointer; border:none; transition:all 0.1s; white-space:nowrap; line-height:1.5; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:#0958d9; }
.btn-default { background:#fff; border:1px solid #d9d9d9; color:var(--text-secondary); }
.btn-default:hover { border-color:var(--primary); color:var(--primary); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#cf1322; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#389e0d; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn.loading { position:relative; color:transparent !important; }
.btn.loading::after { content:''; position:absolute; width:12px; height:12px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; top:50%; left:50%; margin:-6px 0 0 -6px; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Expanded chart modal */
.chart-modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; z-index:1000; }
.chart-modal { background:#fff; border-radius:12px; width:600px; max-width:90vw; max-height:80vh; overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,0.12); }
.chart-modal-header { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid var(--border); }
.chart-modal-title { font-size:14px; font-weight:600; }
.chart-modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-tertiary); padding:4px; }
.chart-modal-body { padding:20px; min-height:200px; }
.chart-modal-chart { width:100%; height:250px; background:linear-gradient(180deg,#f0f5ff 0%,#e6f7ff 100%); border-radius:8px; display:flex; align-items:flex-end; gap:6px; padding:10px; }
.chart-modal-bar { flex:1; border-radius:4px 4px 0 0; min-height:8px; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
.chart-modal-bar .cmb-label { font-size:9px; color:var(--text-tertiary); margin-top:4px; }
.chart-modal-bar .cmb-value { font-size:10px; font-weight:600; margin-bottom:4px; }
.chart-modal-actions { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }

/* Input area */
.input-area { border-top:1px solid var(--border); padding:10px 20px; display:flex; gap:8px; flex-shrink:0; background:#fff; }
.input-area input { flex:1; border:1px solid #d9d9d9; border-radius:8px; padding:10px 14px; font-size:12px; outline:none; font-family:inherit; transition:border-color 0.1s; }
.input-area input:focus { border-color:var(--primary); }
.send-btn { background:var(--primary); color:#fff; border:none; border-radius:8px; padding:10px 18px; font-size:12px; cursor:pointer; transition:all 0.1s; font-family:inherit; }
.send-btn:hover { background:#0958d9; }
.send-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* Loading dots */
.typing-indicator { display:flex; gap:4px; padding:4px 0; }
.typing-dot { width:6px; height:6px; border-radius:50%; background:var(--primary); opacity:0.4; animation:typing 1s infinite; }
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes typing { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-disabled); }

/* Empty state */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-disabled); }
.empty-state .es-icon { font-size:48px; margin-bottom:12px; }
.empty-state .es-text { font-size:12px; }

/* ========== Tool Views ========== */
.tool-views { position:absolute; top:48px; left:220px; right:0; bottom:0; background:#fff; z-index:100; display:flex; flex-direction:column; }
.tv-header { height:44px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 16px; flex-shrink:0; background:#fff; }
.tv-header-left { display:flex; align-items:center; gap:10px; }
.tv-back { font-size:11px; color:var(--primary); cursor:pointer; padding:4px 8px; border-radius:4px; }
.tv-back:hover { background:var(--primary-light); }
.tv-title { font-size:14px; font-weight:600; color:var(--text); }
.tv-header-actions { display:flex; gap:6px; }
.tv-close { font-size:16px; color:var(--text-tertiary); cursor:pointer; padding:4px 6px; border-radius:4px; }
.tv-close:hover { background:var(--bg); color:var(--text); }
.tv-body { flex:1; overflow:hidden; }
.tv-pane { height:100%; overflow-y:auto; display:none; padding:16px 20px; }
.tv-btn { font-size:11px; padding:6px 14px; border-radius:6px; cursor:pointer; border:none; font-family:inherit; transition:all 0.1s; white-space:nowrap; }
.tv-btn.primary { background:var(--primary); color:#fff; }
.tv-btn.primary:hover { background:#0958d9; }
.tv-btn.default { background:#fff; border:1px solid #d9d9d9; color:var(--text-secondary); }
.tv-btn.default:hover { border-color:var(--primary); color:var(--primary); }
.tv-btn.danger { background:var(--danger); color:#fff; }
.tv-btn.danger:hover { background:#cf1322; }
.tv-btn.sm { padding:4px 10px; font-size:10px; }

/* ========== Capability Center ========== */
.cap-layout { display:flex; gap:16px; height:100%; }
.cap-sidebar { width:180px; flex-shrink:0; border-right:1px solid var(--border); padding-right:12px; }
.cap-main { flex:1; min-width:0; }
.cap-search-wrap { position:relative; margin-bottom:10px; }
.cap-search-icon { position:absolute; left:8px; top:7px; font-size:11px; }
.cap-search { width:100%; padding:6px 8px 6px 24px; border:1px solid #d9d9d9; border-radius:6px; font-size:11px; outline:none; font-family:inherit; box-sizing:border-box; }
.cap-search:focus { border-color:var(--primary); }
.cap-cat-item { font-size:11px; padding:6px 8px; border-radius:4px; cursor:pointer; color:var(--text-secondary); margin-bottom:2px; display:flex; align-items:center; gap:4px; }
.cap-cat-item:hover { background:var(--bg); }
.cap-cat-item.active { background:var(--primary-light); color:var(--primary); font-weight:600; }
.cap-cat-item .cc-count { font-size:9px; color:var(--text-disabled); margin-left:auto; }
.cap-new-cat { font-size:10px; color:var(--primary); cursor:pointer; padding:6px 8px; margin-top:4px; }
.cap-new-cat:hover { background:var(--primary-light); border-radius:4px; }
.cap-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.cap-count { font-size:11px; color:var(--text-tertiary); }
.cap-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
.cap-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:12px; cursor:default; transition:all 0.15s; }
.cap-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.06); border-color:#d6e4ff; }
.cap-card-header { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.cap-card-icon { font-size:16px; }
.cap-card-name { font-size:12px; font-weight:600; }
.cap-card-type { font-size:9px; padding:1px 6px; border-radius:3px; background:#f0f5ff; color:var(--primary); margin-left:auto; }
.cap-card-desc { font-size:10px; color:var(--text-tertiary); line-height:1.5; margin-bottom:8px; }
.cap-card-meta { display:flex; gap:10px; font-size:9px; color:var(--text-disabled); margin-bottom:6px; }
.cap-card-actions { display:flex; gap:6px; justify-content:flex-end; border-top:1px solid var(--border); padding-top:6px; }
.cap-card-action { font-size:9px; padding:3px 8px; border-radius:3px; cursor:pointer; color:var(--text-tertiary); }
.cap-card-action:hover { background:var(--bg); color:var(--text); }
.cap-card-action.danger:hover { color:var(--danger); background:#fff1f0; }
.cap-card .cap-bound { font-size:9px; color:var(--primary); background:var(--primary-light); padding:2px 6px; border-radius:3px; display:inline-block; }
.cap-empty { font-size:12px; color:var(--text-disabled); text-align:center; padding:40px; }

/* ========== Knowledge Base ========== */
.kb-layout { max-width:900px; margin:0 auto; }
.kb-upload-zone { border:2px dashed #d9d9d9; border-radius:10px; padding:20px; text-align:center; cursor:pointer; margin-bottom:14px; transition:all 0.15s; }
.kb-upload-zone:hover { border-color:var(--primary); background:var(--primary-light); }
.kb-uz-icon { font-size:28px; display:block; margin-bottom:6px; }
.kb-uz-text { font-size:12px; color:var(--text-secondary); }
.kb-uz-hint { font-size:10px; color:var(--text-disabled); margin-top:4px; }
.kb-search-wrap { position:relative; margin-bottom:12px; max-width:400px; }
.kb-search-icon { position:absolute; left:8px; top:7px; font-size:11px; }
.kb-search { width:100%; padding:6px 8px 6px 24px; border:1px solid #d9d9d9; border-radius:6px; font-size:11px; outline:none; font-family:inherit; box-sizing:border-box; }
.kb-search:focus { border-color:var(--primary); }
.kb-overview { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; margin-bottom:14px; }
.kb-ov-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:12px; cursor:pointer; transition:all 0.15s; }
.kb-ov-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.kb-ov-card.active { border-color:var(--primary); background:var(--primary-light); }
.kb-ov-top { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.kb-ov-name { font-size:12px; font-weight:600; }
.kb-ov-stats { font-size:10px; color:var(--text-tertiary); }
.kb-ov-progress { display:flex; align-items:center; gap:6px; margin-top:6px; }
.kb-ov-bar { flex:1; height:4px; background:#f0f0f0; border-radius:2px; overflow:hidden; }
.kb-ov-bar-fill { height:100%; border-radius:2px; transition:width 0.3s; }
.kb-ov-pct { font-size:9px; color:var(--text-tertiary); }
.kb-ov-agents { font-size:9px; color:var(--text-disabled); margin-top:4px; }
.kb-agent-tag { display:inline-block; font-size:8px; padding:1px 5px; border-radius:3px; background:var(--primary-light); color:var(--primary); margin-right:2px; }
.kb-section-title { font-size:12px; font-weight:600; margin:12px 0 8px; display:flex; align-items:center; gap:6px; }
.kb-file-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:6px; border:1px solid var(--border); margin-bottom:4px; }
.kb-file-item:hover { background:var(--bg); }
.kb-fi-icon { font-size:14px; }
.kb-fi-body { flex:1; min-width:0; cursor:pointer; }
.kb-fi-name { font-size:11px; font-weight:500; color:var(--text); }
.kb-fi-meta { font-size:9px; color:var(--text-tertiary); }
.kb-fi-status { font-size:9px; padding:1px 6px; border-radius:3px; }
.kb-fi-time { font-size:9px; color:var(--text-disabled); }
.kb-fi-actions { display:flex; gap:4px; }
.kb-fi-action { font-size:9px; padding:2px 6px; border-radius:3px; cursor:pointer; color:var(--text-tertiary); }
.kb-fi-action:hover { background:var(--bg); }
.kb-fi-action.danger:hover { color:var(--danger); background:#fff1f0; }
.kb-fi-ref { font-size:9px; color:var(--text-disabled); margin-top:2px; }
.kb-empty { font-size:12px; color:var(--text-disabled); text-align:center; padding:30px; }
.kb-upload-progress { margin:8px 0; padding:8px 12px; background:#f6ffed; border:1px solid #b7eb8f; border-radius:6px; font-size:11px; color:#389e0d; display:flex; align-items:center; gap:6px; }
.kb-upload-progress.parsing { background:#fff7e6; border-color:#ffd591; color:#d46b08; }
.kb-upload-progress.error { background:#fff1f0; border-color:#ffa39e; color:#cf1322; }

/* ========== Agent Management ========== */
.ag-layout { max-width:900px; margin:0 auto; }
.ag-section-label { font-size:11px; font-weight:600; color:var(--text-tertiary); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.ag-preset-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin-bottom:16px; }
.ag-preset-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; cursor:pointer; transition:all 0.15s; }
.ag-preset-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.ag-preset-icon { font-size:24px; display:block; margin-bottom:4px; }
.ag-preset-name { font-size:11px; font-weight:600; }
.ag-preset-role { font-size:9px; color:var(--text-tertiary); margin:2px 0; }
.ag-preset-badge { font-size:9px; padding:1px 6px; border-radius:3px; display:inline-block; margin-top:4px; }
.ag-preset-footer { font-size:9px; color:var(--text-disabled); display:flex; justify-content:center; gap:8px; margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
.ag-divider { text-align:center; margin:16px 0; position:relative; }
.ag-divider::before { content:''; position:absolute; left:0; right:0; top:50%; height:1px; background:var(--border); }
.ag-divider span { background:#fff; padding:0 12px; font-size:10px; color:var(--text-tertiary); position:relative; }
.ag-toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.ag-count { font-size:11px; color:var(--text-tertiary); }
.ag-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:10px; }
.ag-card { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:12px; transition:all 0.15s; }
.ag-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.ag-card-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.ag-card-icon { font-size:20px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:#f0f5ff; }
.ag-card-info { flex:1; }
.ag-card-name { font-size:12px; font-weight:600; }
.ag-card-meta-line { font-size:9px; color:var(--text-tertiary); display:flex; gap:6px; }
.ag-card-status { font-size:9px; padding:2px 8px; border-radius:10px; }
.ag-card-body { font-size:10px; color:var(--text-tertiary); line-height:1.5; margin-bottom:8px; }
.ag-card-binds { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.ag-card-bind-tag { font-size:9px; padding:2px 6px; border-radius:3px; background:#f5f5f5; color:var(--text-secondary); }
.ag-card-stats { display:flex; gap:12px; font-size:9px; color:var(--text-disabled); margin-bottom:8px; padding-top:6px; border-top:1px solid var(--border); }
.ag-card-actions { display:flex; gap:6px; justify-content:flex-end; }
.ag-card-action { font-size:9px; padding:4px 10px; border-radius:4px; cursor:pointer; border:1px solid #d9d9d9; background:#fff; color:var(--text-secondary); font-family:inherit; }
.ag-card-action:hover { border-color:var(--primary); color:var(--primary); }
.ag-card-action.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
.ag-card-action.primary:hover { background:#0958d9; }
.ag-card-action.danger { color:var(--danger); border-color:var(--danger); }
.ag-card-action.danger:hover { background:var(--danger); color:#fff; }
.ag-empty { font-size:12px; color:var(--text-disabled); text-align:center; padding:40px; }

/* ========== Modal Overlay ========== */
.tv-modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.3); z-index:200; display:flex; align-items:center; justify-content:center; }
.tv-modal { background:#fff; border-radius:12px; width:560px; max-width:90vw; max-height:85vh; overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,0.12); display:flex; flex-direction:column; }
.tv-modal-header { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
.tv-modal-title { font-size:14px; font-weight:600; }
.tv-modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-tertiary); padding:4px; }
.tv-modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
.tv-modal-footer { display:flex; gap:8px; justify-content:flex-end; padding:12px 20px; border-top:1px solid var(--border); flex-shrink:0; }
.tv-modal label { font-size:11px; font-weight:500; color:var(--text-secondary); display:block; margin-bottom:4px; margin-top:10px; }
.tv-modal label:first-child { margin-top:0; }
.tv-modal input[type=text], .tv-modal input[type=number], .tv-modal textarea, .tv-modal select { width:100%; padding:7px 10px; border:1px solid #d9d9d9; border-radius:6px; font-size:11px; outline:none; font-family:inherit; box-sizing:border-box; }
.tv-modal input:focus, .tv-modal textarea:focus, .tv-modal select:focus { border-color:var(--primary); }
.tv-modal textarea { min-height:60px; resize:vertical; }
.tv-modal .form-row { display:flex; gap:10px; }
.tv-modal .form-row > * { flex:1; }
.tv-modal .tag-select { display:flex; flex-wrap:wrap; gap:4px; }
.tv-modal .tag-opt { font-size:10px; padding:3px 10px; border-radius:4px; border:1px solid #d9d9d9; cursor:pointer; background:#fff; color:var(--text-secondary); }
.tv-modal .tag-opt.selected { background:var(--primary-light); border-color:var(--primary); color:var(--primary); }
.tv-modal .form-hint { font-size:9px; color:var(--text-disabled); margin-top:2px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <img src="/static/logo.jpg" alt="云砾" style="height:28px;margin-top:2px;">
    <div class="topbar-actions">
      <span onclick="alert('⚙️ 设置功能即将上线')">⚙️ 设置</span>
      <span onclick="alert('🆘 紧急通道已开启，请联系技术支持')">🆘 SOS</span>
    </div>
  </div>
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-scroll">
        <div class="sidebar-title">🤖 我的智能体</div>
        <div id="agentList"></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title" style="margin-top:0;">🛠 工具</div>
        <div class="sf-item" onclick="switchTool('capabilities')">🔧 能力中心</div>
        <div class="sf-item" onclick="switchTool('knowledge')">📚 知识库</div>
        <div class="sf-item" onclick="switchTool('agents')">🤖 管理智能体</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header" id="chatHeader">
        <span class="ch-icon" id="chatHeaderIcon">👩‍💼</span>
        <div>
          <div class="ch-name" id="chatHeaderName">杨姐的税务助理</div>
          <div class="ch-role" id="chatHeaderRole">你的个人税务管家</div>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="input-area">
        <input id="chatInput" placeholder="问AI：今天有什么紧急的？" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <!-- ========== Tool Views (overlay the chat area) ========== -->
  <div class="tool-views" id="toolViews" style="display:none;">
    <div class="tv-header">
      <div class="tv-header-left">
        <span class="tv-back" onclick="closeToolView()">← 返回对话</span>
        <span class="tv-title" id="tvTitle">🔧 能力中心</span>
      </div>
      <div class="tv-header-actions">
        <span class="tv-close" onclick="closeToolView()">✕</span>
      </div>
    </div>
    <div class="tv-body">
      <!-- Capability Center -->
      <div class="tv-pane" id="tv-capabilities">
        <div class="cap-layout">
          <div class="cap-sidebar">
            <div class="cap-search-wrap"><span class="cap-search-icon">🔍</span><input class="cap-search" id="capSearch" placeholder="搜索能力..." oninput="filterCapabilities(this.value)"></div>
            <div class="cap-cat-list" id="capCatList"></div>
            <div class="cap-new-cat" onclick="showNewCapCategoryModal()">+ 新建分类</div>

          <div class="cap-main">

              <span class="cap-count" id="capCount"></span>
              <span class="tv-btn primary" onclick="showCapForm(null)">+ 新建能力</span>

            <div class="cap-grid" id="capGrid"></div>

      <!-- Knowledge Base -->
      <div class="tv-pane" id="tv-knowledge">
        <div class="kb-layout">

            <span class="kb-uz-icon">📂</span>
            <div class="kb-uz-text">拖拽文件到此处，或点击上传</div>
            <div class="kb-uz-hint">支持 PDF / Word / Excel / TXT / CSV</div>
            <input type="file" id="kbFileInput" style="display:none" accept=".pdf,.docx,.xlsx,.txt,.csv" multiple onchange="handleKBUpload(this)">
          </div>
          <div class="kb-search-wrap"><span class="kb-search-icon">🔍</span><input class="kb-search" id="kbSearch" placeholder="搜索文件名..." oninput="filterKBFiles(this.value)"></div>
          <div class="kb-overview" id="kbOverview"></div>
          <div class="kb-file-list" id="kbFileList"></div>
        </div>
      </div>

      <!-- Agent Management -->
      <div class="tv-pane" id="tv-agents">
        <div class="ag-layout">
          <div class="ag-section-label">🤖 预设智能体</div>
          <div class="ag-preset-grid" id="agPresetGrid"></div>
          <div class="ag-divider"><span>自定义智能体</span></div>
          <div class="ag-toolbar">
            <span class="ag-count" id="agCount"></span>
            <span class="tv-btn primary" onclick="showAgentCreateForm()">+ 创建智能体</span>

<script>
// ========================================
// Data
// ========================================
const AGENTS = {{ agents|tojson|safe }};

// State
let currentAgent = null;
let conversations = {};

// ========================================
// Init
// ========================================
function init() {
    renderAgentList();
    // Default to first agent
    selectAgent(AGENTS[0].id);
}

function renderAgentList() {
    var html = '';
    AGENTS.forEach(function(a) {
        var badgeClass = a.status === 'urgent' ? 'badge-urgent' : (a.status === 'warning' ? 'badge-warning' : (a.status === 'normal' ? 'badge-normal' : 'badge-idle'));
        html += '<div class="agent-card" id="card-' + a.id + '" onclick="selectAgent(\'' + a.id + '\')">' +
            '<div class="ac-top">' +
                '<span class="ac-icon">' + a.icon + '</span>' +
                '<span class="ac-name">' + a.name + '</span>' +
                '<span class="ac-badge ' + badgeClass + '">' + a.badge + '</span>' +
            '</div>' +
            '<div class="ac-summary">' + a.summary + '</div>' +
        '</div>';
    });
    document.getElementById('agentList').innerHTML = html;
}

// ========================================
// Agent Selection
// ========================================
function selectAgent(agentId) {
    var agent = AGENTS.find(function(a) { return a.id === agentId; });
    if (!agent) return;
    currentAgent = agent;
    
    // Update sidebar highlight
    document.querySelectorAll('.agent-card').forEach(function(c) { c.classList.remove('active'); });
    var card = document.getElementById('card-' + agentId);
    if (card) card.classList.add('active');
    
    // Update header
    document.getElementById('chatHeaderIcon').textContent = agent.icon;
    document.getElementById('chatHeaderName').textContent = agent.name;
    document.getElementById('chatHeaderRole').textContent = agent.role;
    
    // Update placeholder
    document.getElementById('chatInput').placeholder = agent.placeholder || '问AI：今天有什么紧急的？';
    
    // Render conversation
    renderConversation(agentId);
}

function renderConversation(agentId) {
    var container = document.getElementById('chatMessages');
    var agent = AGENTS.find(function(a) { return a.id === agentId; });
    if (!agent) return;
    
    // Create conversation if not exists
    if (!conversations[agentId]) {
        conversations[agentId] = [];
        // Add greeting as first message
        conversations[agentId].push({
            role: 'agent',
            type: 'greeting',
            text: agent.greeting,
            tasks: agent.tasks,
        });
    }
    
    renderMessages(agentId);
}

// ========================================
// Message Rendering
// ========================================
function renderMessages(agentId) {
    var container = document.getElementById('chatMessages');
    var msgs = conversations[agentId] || [];
    var agent = AGENTS.find(function(a) { return a.id === agentId; });
    if (!agent) return;
    
    if (msgs.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="es-icon">💬</div><div class="es-text">开始和' + agent.name + '对话吧</div></div>';
        return;
    }
    
    var html = '';
    msgs.forEach(function(m, idx) {
        var isAgent = m.role === 'agent';
        var time = m.time || '';
        
        html += '<div class="msg ' + (isAgent ? 'msg-agent' : 'msg-user') + '">';
        html += '<div class="msg-avatar ' + (isAgent ? 'ava-agent' : 'ava-user') + '">' + (isAgent ? agent.icon : '👤') + '</div>';
        html += '<div class="msg-body">';
        html += '<div class="msg-meta">' + (isAgent ? agent.name : '你') + (time ? ' · ' + time : '') + '</div>';
        
        // Message content
        if (m.type === 'typing') {
            html += '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        } else {
            html += '<div class="msg-text">' + formatText(m.text) + '</div>';
            
            // Chat cards
            if (m.cards) {
                m.cards.forEach(function(card, ci) {
                    html += renderCard(card, ci, agentId, idx);
                });
            }
            
            // Action buttons
            if (m.tasks || m.actions) {
                var actions = m.tasks || m.actions || [];
                html += '<div class="msg-actions">';
                actions.forEach(function(action) {
                    if (action.intent === 'dismiss') return;
                    var btnClass = action.style === 'primary' || action.intent.startsWith('certify') || action.intent.startsWith('send_urge') ? 'btn-primary' : 
                                  action.style === 'danger' || action.intent.startsWith('gen_audit') ? 'btn-danger' : 'btn-default';
                    html += '<button class="btn ' + btnClass + '" onclick="handleAction(\'' + action.intent + '\',\'' + (JSON.stringify(action.params || {}).replace(/'/g,"\\'")) + '\',this)">' + action.label + '</button>';
                });
                html += '</div>';
            }
        }
        
        html += '</div></div>';
    });
    
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

function formatText(text) {
    if (!text) return '';
    // Convert markdown-style bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Convert newlines to <br>
    text = text.replace(/\n/g, '<br>');
    return text;
}

function renderCard(card, cardIdx, agentId, msgIdx) {
    if (!card || card.type !== 'data-card') return '';
    
    var statusColor = card.status === 'danger' ? '#f5222d' : (card.status === 'warning' ? '#fa8c16' : '#52c41a');
    var bars = '';
    if (card.chart === 'bar' && card.dimensions && card.values) {
        var maxVal = Math.max.apply(null, card.values);
        card.dimensions.forEach(function(d, di) {
            var h = Math.round((card.values[di] / maxVal) * 60);
            bars += '<div class="chart-bar" style="height:' + h + 'px;background:' + statusColor + '40;" onclick="expandChart(' + cardIdx + ',' + agentId + ',' + msgIdx + ')">' +
                '<span class="bar-value" style="color:' + statusColor + ';">' + card.values[di] + '</span>' +
                '<span class="bar-label">' + d + '</span>' +
                '</div>';
        });
    }
    
    return '<div class="chat-card">' +
        '<div class="chat-card-header" onclick="toggleCardBody(this)">' +
            '<div class="chat-card-title">' +
                '<span style="color:' + statusColor + ';">' + (card.status === 'danger' ? '🔴' : card.status === 'warning' ? '🟠' : '🟢') + '</span> ' +
                card.title +
            '</div>' +
            '<span class="chat-card-toggle">▼</span>' +
        '</div>' +
        '<div class="chat-card-body">' +
            '<div class="chat-card-summary">' + card.summary + '</div>' +
            '<div class="chat-card-chart" onclick="expandChart(' + cardIdx + ',' + agentId + ',' + msgIdx + ')">' +
                bars +
            '</div>' +
            '<div class="msg-actions">' +
                '<button class="btn btn-default" onclick="expandChart(' + cardIdx + ',' + agentId + ',' + msgIdx + ')">📈 查看完整趋势</button>' +
                '<button class="btn btn-default" onclick="handleAction(\'export_card\',{},this)">📥 导出</button>' +
            '</div>' +
        '</div>' +
    '</div>';
}

function toggleCardBody(header) {
    var body = header.nextElementSibling;
    var toggle = header.querySelector('.chat-card-toggle');
    if (!body || !toggle) return;
    var isHidden = body.style.display === 'none';
    body.style.display = isHidden ? 'block' : 'none';
    toggle.textContent = isHidden ? '▼' : '▶';
}

function expandChart(cardIdx, agentId, msgIdx) {
    var agent = AGENTS.find(function(a) { return a.id === agentId; });
    if (!agent) return;
    
    // In a real app, this would load dynamic chart data
    var overlay = document.createElement('div');
    overlay.className = 'chart-modal-overlay';
    overlay.onclick = function(e) { if (e.target === this) this.remove(); };
    
    var colors = ['#1677ff', '#69b1ff', '#91caff', '#bae0ff'];
    
    overlay.innerHTML = '<div class="chart-modal">' +
        '<div class="chart-modal-header">' +
            '<div class="chart-modal-title">📈 认证率趋势 · 近30天 (模拟数据)</div>' +
            '<button class="chart-modal-close" onclick="this.closest(\'.chart-modal-overlay\').remove()">✕</button>' +
        '</div>' +
        '<div class="chart-modal-body">' +
            '<div class="chart-modal-chart" id="expandedChart"></div>' +
            '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">' +
                '<span style="font-size:10px;padding:3px 8px;background:#f0f5ff;border-radius:4px;cursor:pointer;border:1px solid #d6e4ff;" onclick="switchChartDim(this,\'region\')">📍 按区域</span>' +
                '<span style="font-size:10px;padding:3px 8px;background:#f0f5ff;border-radius:4px;cursor:pointer;border:1px solid #d6e4ff;" onclick="switchChartDim(this,\'time\')">📅 按时间</span>' +
                '<span style="font-size:10px;padding:3px 8px;background:#f0f5ff;border-radius:4px;cursor:pointer;border:1px solid #d6e4ff;" onclick="switchChartDim(this,\'company\')">🏢 按公司</span>' +
            '</div>' +
        '</div>' +
        '<div class="chart-modal-actions" style="padding:0 20px 14px;">' +
            '<button class="btn btn-default" onclick="this.closest(\'.chart-modal-overlay\').remove()">关闭</button>' +
            '<button class="btn btn-primary" onclick="alert(\'📥 导出中...\')">📥 导出</button>' +
        '</div>' +
    '</div>';
    document.body.appendChild(overlay);
    
    // Render dynamic bars
    renderChartBars('expandedChart', [
        { label: '华东', value: 92 },
        { label: '华南', value: 67 },
        { label: '华北', value: 85 },
        { label: '华中', value: 45 },
    ], colors);
}

function renderChartBars(containerId, data, colors) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var maxVal = Math.max.apply(null, data.map(function(d) { return d.value; }));
    var html = '';
    data.forEach(function(d, i) {
        var h = Math.round((d.value / maxVal) * 200);
        html += '<div class="chart-modal-bar" style="height:' + h + 'px;background:' + (colors[i % colors.length]) + '80;flex:1;">' +
            '<span class="cmb-value" style="color:' + (colors[i % colors.length]) + ';">' + d.value + '%</span>' +
            '<span class="cmb-label">' + d.label + '</span>' +
        '</div>';
    });
    container.innerHTML = html;
}

window.switchChartDim = function(el, dim) {
    document.querySelectorAll('#expandedChart').forEach(function(c) {
        if (dim === 'region') renderChartBars('expandedChart', [
            { label: '华东', value: 92 }, { label: '华南', value: 67 },
            { label: '华北', value: 85 }, { label: '华中', value: 45 },
        ], ['#1677ff', '#69b1ff', '#91caff', '#bae0ff']);
        else if (dim === 'time') renderChartBars('expandedChart', [
            { label: '第1周', value: 38 }, { label: '第2周', value: 42 },
            { label: '第3周', value: 41 }, { label: '第4周', value: 45 },
        ], ['#52c41a', '#73d13d', '#95de64', '#b7eb8f']);
        else renderChartBars('expandedChart', [
            { label: '第1分公司', value: 23 }, { label: '第3分公司', value: 8 },
            { label: '第5分公司', value: 3 }, { label: '第7分公司', value: 2 },
        ], ['#f5222d', '#ff4d4f', '#ff7875', '#ffa39e']);
    });
};

// ========================================
// Send Message
// ========================================
function sendMessage() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text || !currentAgent) return;
    input.value = '';
    
    var btn = document.getElementById('sendBtn');
    btn.disabled = true;
    
    // Add user message
    if (!conversations[currentAgent.id]) conversations[currentAgent.id] = [];
    conversations[currentAgent.id].push({ role: 'user', type: 'text', text: text, time: getTime() });
    
    // Add typing indicator
    conversations[currentAgent.id].push({ role: 'agent', type: 'typing' });
    renderMessages(currentAgent.id);
    
    // Call API
    fetch('/api/chat/' + currentAgent.id, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, context: { page: 'chat' } }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        // Remove typing indicator
        var msgs = conversations[currentAgent.id];
        if (msgs && msgs.length > 0 && msgs[msgs.length - 1].type === 'typing') {
            msgs.pop();
        }
        
        // Add AI response
        var reply = data.reply;
        var msg = {
            role: 'agent',
            type: reply.type || 'text',
            text: reply.text || '收到！',
            time: getTime(),
        };
        if (reply.cards) msg.cards = reply.cards;
        if (reply.actions) msg.actions = reply.actions;
        conversations[currentAgent.id].push(msg);
        
        renderMessages(currentAgent.id);
        btn.disabled = false;
    })
    .catch(function(err) {
        console.error('Chat error:', err);
        var msgs = conversations[currentAgent.id];
        if (msgs && msgs.length > 0 && msgs[msgs.length - 1].type === 'typing') {
            msgs.pop();
        }
        conversations[currentAgent.id].push({
            role: 'agent',
            type: 'text',
            text: '抱歉，我暂时遇到了一些问题。请稍后再试。',
            time: getTime(),
        });
        renderMessages(currentAgent.id);
        btn.disabled = false;
    });
}

// ========================================
// Action Handler
// ========================================
function handleAction(intent, paramsStr, btn) {
    var params = {};
    try { params = JSON.parse(paramsStr); } catch(e) {}
    
    btn.disabled = true;
    btn.classList.add('loading');
    
    // Simulate action execution
    setTimeout(function() {
        btn.classList.remove('loading');
        btn.disabled = false;
        
        var responses = {
            'certify_urgent': '✅ 已提交认证！3张高危发票全部认证成功。\n\n📄 认证结果：\n• 苏宁电气 ✅ 成功\n• 雪峰致远 ✅ 成功\n• 华中·第1分公司 ✅ 成功\n\n💰 已抵扣：¥469,500',
            'send_urge': '📨 督办通知已发送！\n\n📋 通知编号：NOT-2026-0789\n📌 目标区域：' + (params.region || '华中区') + '\n📎 内容：认证率过低整改通知\n\n对方将在今天内收到并处理。',
            'analyze_region': '📊 ' + (params.region || '华中区') + '分析完成：\n\n认证率45%，低于集团均值26个百分点。\n• 23张超期发票可追回¥56万\n• 建议立即发督办并设置自动认证规则',
            'show_expiring': '🔴 3张即将过期发票：\n\n• 苏宁电气 ¥456,000 — 还剩8天\n• 雪峰致远 ¥12,300 — 还剩5天\n• 华中·第1分公司 ¥1,200 — 还剩3天\n\n建议优先处理苏宁电气，金额最大。',
            'show_cert_trend': '📈 认证率趋势：\n\n本周41.4%，较上周下降3个百分点。\n最近4周趋势：38% → 42% → 41% → 45%\n华中区持续拖后腿，华东区表现稳定。',

}

// ========================================
// Capability Center
// ========================================
var capFilterCat = '全部能力';
var capFilterSearch = '';

function loadCapCategories() {
    fetch('/api/cap-categories').then(function(r) { return r.json(); }).then(function(cats) {
        var html = '';
        cats.forEach(function(c) {
            html += '<div class="cap-cat-item' + (c.name === capFilterCat ? ' active' : '') + '" onclick="capFilterCat=\'' + c.name + '\';loadCapCategories();loadCapabilities();">' +
                c.icon + ' ' + c.name + '</div>';
        });
        document.getElementById('capCatList').innerHTML = html;
    });
}

function loadCapabilities() {
    fetch('/api/capabilities').then(function(r) { return r.json(); }).then(function(data) {
        var filtered = data.filter(function(c) {
            if (capFilterCat !== '全部能力' && c.category !== capFilterCat) return false;
            if (capFilterSearch && c.name.indexOf(capFilterSearch) < 0 && c.description.indexOf(capFilterSearch) < 0) return false;
            return true;
        });
        document.getElementById('capCount').textContent = filtered.length + ' 项能力';
        if (filtered.length === 0) {
            document.getElementById('capGrid').innerHTML = '<div class="cap-empty">🔧 暂无匹配的能力</div>';
            return;
        }
        var html = '';
        filtered.forEach(function(c) {
            var typeLabels = { auto:'⚡自动执行', ai_assisted:'🧠AI辅助', manual:'👤人工确认', connection:'🔗连接' };
            var typeLabel = typeLabels[c.type] || c.type;
            var boundHtml = c.boundAgents && c.boundAgents.length > 0 ? '<span class="cap-bound">🤖 被' + c.boundAgents.length + '个智能体使用</span>' : '';
            html += '<div class="cap-card">' +
                '<div class="cap-card-header">' +
                    '<span class="cap-card-icon">' + c.icon + '</span>' +
                    '<span class="cap-card-name">' + c.name + '</span>' +
                    '<span class="cap-card-type">' + typeLabel + '</span>' +
                '</div>' +
                '<div class="cap-card-desc">' + c.description + '</div>' +
                '<div class="cap-card-meta">' +
                    '<span>📂 ' + (c.category || '未分类') + '</span>' +
                    '<span>🔄 ' + (c.trigger === 'scheduled' ? '定时' : '手动') + '</span>' +
                    boundHtml +
                '</div>' +
                '<div class="cap-card-actions">' +
                    '<span class="cap-card-action" onclick="showCapForm(\'' + c.id + '\')">📝 编辑</span>' +
                    '<span class="cap-card-action ' + (c.status === 'enabled' ? '' : '') + '" onclick="toggleCapStatus(\'' + c.id + '\')">' + (c.status === 'enabled' ? '⏸ 禁用' : '▶ 启用') + '</span>' +
                    '<span class="cap-card-action danger" onclick="deleteCapability(\'' + c.id + '\')">🗑 删除</span>' +
                '</div>' +
            '</div>';
        });
        document.getElementById('capGrid').innerHTML = html;
    });
}

function filterCapabilities(val) {
    capFilterSearch = val;
    loadCapabilities();
}

function showCapForm(capId) {
    var isEdit = !!capId;
    var cap = null;
    if (isEdit) {
        // Need to fetch fresh data
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/capabilities', false);
        xhr.send();
        var all = JSON.parse(xhr.responseText);
        cap = all.find(function(c) { return c.id === capId; });
    }
    var title = isEdit ? '编辑能力' : '新建能力';
    var n = cap || { name:'', category:'发票类', icon:'🔧', type:'ai_assisted', description:'', trigger:'manual', outputFormat:'text', steps:[] };
    
    fetch('/api/cap-categories').then(function(r) { return r.json(); }).then(function(cats) {
        var catOpts = cats.filter(function(c) { return !c.builtin; }).map(function(c) {
            return '<option' + (c.name === n.category ? ' selected' : '') + '>' + c.name + '</option>';
        }).join('');
        
        var typeOpts = ['auto','ai_assisted','manual','connection'].map(function(t) {
            var labels = { auto:'⚡自动执行', ai_assisted:'🧠AI辅助', manual:'👤人工确认', connection:'🔗连接' };
            return '<option value="' + t + '"' + (t === n.type ? ' selected' : '') + '>' + labels[t] + '</option>';
        }).join('');
        
        var triggerOpts = ['manual','scheduled','event'].map(function(t) {
            var labels = { manual:'手动', scheduled:'定时', event:'事件触发' };
            return '<option value="' + t + '"' + (t === n.trigger ? ' selected' : '') + '>' + labels[t] + '</option>';
        }).join('');
        
        var stepsHtml = '';
        if (n.steps) {
            n.steps.forEach(function(s, i) {
                stepsHtml += '<div class="form-row" style="margin-bottom:4px;"><input type="text" class="step-name" value="' + (s.name||'') + '" placeholder="步骤名称"><input type="text" class="step-skill" value="' + (s.skill||'') + '" placeholder="选择Skill..." style="flex:2;"><span class="tv-btn sm default" onclick="this.parentElement.remove()">✕</span></div>';
            });
        }
        
        var body = '<label>能力名称</label><input type="text" id="capFormName" value="' + n.name + '" placeholder="如：发票合规检查">' +
            '<div class="form-row">' +
                '<div><label>分类</label><select id="capFormCat">' + catOpts + '</select></div>' +
                '<div><label>执行类型</label><select id="capFormType">' + typeOpts + '</select></div>' +
            '</div>' +
            '<label>能力描述</label><textarea id="capFormDesc" placeholder="能力概述...">' + n.description + '</textarea>' +
            '<label>执行步骤</label><div id="capFormSteps">' + (stepsHtml || '<div class="form-hint">暂无步骤，点击下方添加</div>') + '</div>' +
            '<span class="tv-btn sm default" onclick="addCapStep()" style="margin:4px 0 8px;">+ 添加步骤</span>' +
            '<div class="form-row">' +
                '<div><label>触发方式</label><select id="capFormTrigger">' + triggerOpts + '</select></div>' +
                '<div><label>输出格式</label><select id="capFormOutput"><option>文本</option><option selected>JSON</option><option>表格</option></select></div>' +
            '</div>';
        
        showModal(title, body, function() {
            var payload = {
                name: document.getElementById('capFormName').value,
                category: document.getElementById('capFormCat').value,
                type: document.getElementById('capFormType').value,
                description: document.getElementById('capFormDesc').value,
                trigger: document.getElementById('capFormTrigger').value,
                outputFormat: document.getElementById('capFormOutput').value,
                steps: [],
            };
            // Collect steps
            var stepEls = document.querySelectorAll('#capFormSteps .form-row');
            stepEls.forEach(function(el) {
                var name = el.querySelector('.step-name');
                var skill = el.querySelector('.step-skill');
                if (name && name.value) {
                    payload.steps.push({ name: name.value, skill: skill ? skill.value : '' });
                }
            });
            
            if (isEdit) {
                fetch('/api/capabilities/' + capId, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
                    .then(function() { closeModal(); loadCapabilities(); });
            } else {
                fetch('/api/capabilities', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
                    .then(function() { closeModal(); loadCapabilities(); });
            }
        });
    });
}

function addCapStep() {
    var container = document.getElementById('capFormSteps');
    var div = document.createElement('div');
    div.className = 'form-row';
    div.style.marginBottom = '4px';
    div.innerHTML = '<input type="text" class="step-name" placeholder="步骤名称"><input type="text" class="step-skill" placeholder="选择Skill..." style="flex:2;"><span class="tv-btn sm default" onclick="this.parentElement.remove()">✕</span>';
    // Remove hint if present
    var hint = container.querySelector('.form-hint');
    if (hint) hint.remove();
    container.appendChild(div);
}

function toggleCapStatus(capId) {
    fetch('/api/capabilities/' + capId).then(function(r) { return r.json(); }).then(function(cap) {
        var newStatus = cap.status === 'enabled' ? 'disabled' : 'enabled';
        fetch('/api/capabilities/' + capId, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:newStatus}) })
            .then(function() { loadCapabilities(); });
    });
}

function deleteCapability(capId) {
    if (!confirm('确认删除此能力？')) return;
    fetch('/api/capabilities/' + capId, { method:'DELETE' }).then(function() { loadCapabilities(); });
}

// Knowledge Base
// ========================================
var kbActiveCat = null;
var kbSearchVal = '';

function loadKBData() {
    Promise.all([
        fetch('/api/kb/categories').then(function(r) { return r.json(); }),
        fetch('/api/kb/files').then(function(r) { return r.json(); }),
    ]).then(function(results) {
        var cats = results[0];
        var files = results[1];
        
        // Overview cards
        var ovHtml = '';
        cats.forEach(function(c) {
            var total = c.fileCount || 0;
            var parsed = c.parsedCount || 0;
            var pct = total > 0 ? Math.round(parsed/total*100) : 0;
            var barColor = pct === 100 ? '#52c41a' : (pct > 50 ? '#fa8c16' : '#f5222d');
            var agents = c.boundAgents || [];
            var agentTags = agents.map(function(a) {
                var nameMap = {'agent-assistant':'助理','agent-certify':'认证专员','agent-risk':'预警官','agent-declare':'管家','agent-compliance':'合规师'};
                return '<span class="kb-agent-tag">' + (nameMap[a] || a) + '</span>';
            }).join('');
            
            ovHtml += '<div class="kb-ov-card' + (kbActiveCat === c.id ? ' active' : '') + '" onclick="selectKBCat(\'' + c.id + '\')">' +
                '<div class="kb-ov-top"><span>' + (c.icon || '📁') + '</span><span class="kb-ov-name">' + c.name + '</span></div>' +
                '<div class="kb-ov-stats">' + total + ' 文件 · ' + parsed + '/' + total + ' 已解析</div>' +
                '<div class="kb-ov-progress"><div class="kb-ov-bar"><div class="kb-ov-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div><span class="kb-ov-pct">' + pct + '%</span></div>' +
                '<div class="kb-ov-agents">' + (agentTags || '<span style="color:#bfbfbf;">未绑定智能体</span>') + '</div>' +
            '</div>';
        });
        document.getElementById('kbOverview').innerHTML = ovHtml || '<div class="kb-empty">📚 暂无知识库分类</div>';
        
        // File list for active category
        renderKBFiles(files, cats);
    });
}

function selectKBCat(catId) {
    kbActiveCat = catId;
    loadKBData();
}

function renderKBFiles(files, cats) {
    if (!kbActiveCat && cats.length > 0) {
        kbActiveCat = cats[0].id;
    }
    var filtered = files.filter(function(f) {
        if (kbActiveCat && f.categoryId !== kbActiveCat) return false;
        if (kbSearchVal && f.name.indexOf(kbSearchVal) < 0) return false;
        return true;
    });
    
    var cat = cats.find(function(c) { return c.id === kbActiveCat; });
    var title = cat ? (cat.icon + ' ' + cat.name) : '所有文件';
    
    var html = '<div class="kb-section-title">' + title + ' <span style="font-size:10px;color:var(--text-disabled);font-weight:400;">(' + filtered.length + ' 文件)</span></div>';
    
    if (filtered.length === 0) {
        html += '<div class="kb-empty">📂 暂无文件，拖拽文件到上方上传区</div>';
    } else {
        filtered.forEach(function(f) {
            var typeLabels = { pdf:'PDF文档', docx:'Word文档', xlsx:'Excel文档', txt:'文本文件', csv:'CSV文件' };
            var statusColor = f.status === 'parsed' ? '#52c41a' : (f.status === 'parsing' ? '#fa8c16' : '#f5222d');
            var statusBg = f.status === 'parsed' ? '#f6ffed' : (f.status === 'parsing' ? '#fff7e6' : '#fff1f0');
            var statusLabel = f.status === 'parsed' ? '✅ 已解析' : (f.status === 'parsing' ? '⏳ 解析中' : '❌ 解析失败');
            var agents = f.referencedBy || [];
            var refHtml = agents.length > 0 ? '<div class="kb-fi-ref">🤖 ' + agents.length + ' 个智能体引用此文件</div>' : '';
            
            html += '<div class="kb-file-item">' +
                '<span class="kb-fi-icon">' + (f.type === 'pdf' ? '📄' : f.type === 'docx' ? '📝' : f.type === 'xlsx' ? '📊' : '📃') + '</span>' +
                '<div class="kb-fi-body" onclick="previewKBFile(\'' + f.id + '\')">' +
                    '<div class="kb-fi-name">' + f.name + '</div>' +
                    '<div class="kb-fi-meta">' + (typeLabels[f.type] || '文档') + ' · ' + (f.size > 1000000 ? (f.size/1000000).toFixed(1)+'MB' : Math.round(f.size/1000)+'KB') + (f.parsedAt ? ' · ' + f.parsedAt : '') + '</div>' +
                    refHtml +
                '</div>' +
                '<span class="kb-fi-status" style="background:' + statusBg + ';color:' + statusColor + ';">' + statusLabel + '</span>' +
                '<span class="kb-fi-time">' + f.uploadedAt + '</span>' +
                '<div class="kb-fi-actions">' +
                    '<span class="kb-fi-action" onclick="previewKBFile(\'' + f.id + '\')">👁️</span>' +
                    '<span class="kb-fi-action danger" onclick="deleteKBFile(\'' + f.id + '\')">🗑️</span>' +
                '</div>' +
            '</div>';
        });
    }
    document.getElementById('kbFileList').innerHTML = html;
}

function filterKBFiles(val) {
    kbSearchVal = val;
    loadKBData();
}

function handleKBUpload(input) {
    var files = input.files;
    if (!files || files.length === 0) return;
    var catId = kbActiveCat;
    fetch('/api/kb/categories').then(function(r) { return r.json(); }).then(function(cats) {
        if (!catId && cats.length > 0) catId = cats[0].id;
        if (!catId) { alert('请先创建知识库分类'); return; }
        
        var uploaded = 0;
        var totalFiles = files.length;
        
        // Show progress indicator
        var progressDiv = document.createElement('div');
        progressDiv.className = 'kb-upload-progress';
        progressDiv.innerHTML = '⏳ 正在上传 ' + totalFiles + ' 个文件...';
        document.getElementById('kbUploadZone').after(progressDiv);
        
        function uploadNext(idx) {
            if (idx >= totalFiles) {
                progressDiv.className = 'kb-upload-progress';
                progressDiv.innerHTML = '✅ 上传完成！' + totalFiles + ' 个文件已添加';
                setTimeout(function() { progressDiv.remove(); }, 2000);
                loadKBData();
                return;
            }
            
            var f = files[idx];
            var payload = {
                name: f.name,
                categoryId: catId,
                type: f.name.split('.').pop().toLowerCase(),
                size: f.size,
            };
            
            fetch('/api/kb/files', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            }).then(function(r) { return r.json(); }).then(function(newFile) {
                progressDiv.innerHTML = '⏳ 正在解析: ' + f.name;
                // Simulate parsing delay
                setTimeout(function() {
                    fetch('/api/kb/files/' + newFile.id + '/simulate-parse', { method:'POST' }).then(function() {
                        uploaded++;
                        uploadNext(idx + 1);
                    });
                }, 800);
            });
        }
        uploadNext(0);
    });
    input.value = '';
}

function previewKBFile(fileId) {
    fetch('/api/kb/files').then(function(r) { return r.json(); }).then(function(files) {
        var f = files.find(function(x) { return x.id === fileId; });
        if (!f) return;
        var snippet = f.snippet || '暂无预览内容';
        var body = '<div style="white-space:pre-wrap;font-size:11px;line-height:1.7;color:var(--text-secondary);background:var(--bg);padding:12px;border-radius:6px;max-height:300px;overflow-y:auto;">' + snippet + '</div>' +
            '<div style="margin-top:10px;font-size:10px;color:var(--text-tertiary);">文件名: ' + f.name + '<br>类型: ' + (f.type === 'pdf' ? 'PDF' : f.type) + '<br>上传时间: ' + f.uploadedAt + '</div>';
        showModal('👁️ ' + f.name, body, null, '关闭');
    });
}

function deleteKBFile(fileId) {
    if (!confirm('确认删除此文件？')) return;
    fetch('/api/kb/files/' + fileId, { method:'DELETE' }).then(function() { loadKBData(); });
}

            '<div class="ag-preset-name">' + a.name + '</div>' +
            '<div class="ag-preset-role">' + a.role + '</div>' +
            '<span class="ag-preset-badge ' + badgeClass + '">' + a.badge + '</span>' +
            '<div class="ag-preset-footer"><span>预设</span><span>不可删除</span></div>' +
        '</div>';
    });
    document.getElementById('agPresetGrid').innerHTML = html;
}

function viewPresetAgent(agentId) {
    var a = PRESET_AGENTS.find(function(x) { return x.id === agentId; });
    if (!a) return;
    var body = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
        '<span style="font-size:32px;">' + a.icon + '</span>' +
        '<div><div style="font-size:14px;font-weight:600;">' + a.name + '</div><div style="font-size:11px;color:var(--text-tertiary);">' + a.role + '</div></div>' +
        '<span class="ag-preset-badge badge-idle" style="margin-left:auto;">预设</span></div>' +
        '<div style="font-size:11px;line-height:1.6;background:var(--bg);padding:10px;border-radius:6px;white-space:pre-wrap;">' + (a.greeting || '') + '</div>' +
        '<div style="margin-top:10px;font-size:10px;color:var(--text-tertiary);">风格: ' + (a.style || '专业') + ' · 系统预设不可删除</div>';
    showModal('🤖 ' + a.name, body, null, '关闭');
}

function loadManagedAgents() {
    fetch('/api/managed-agents').then(function(r) { return r.json(); }).then(function(agents) {
        document.getElementById('agCount').textContent = agents.length + ' 个智能体';
        if (agents.length === 0) {
            document.getElementById('agGrid').innerHTML = '<div class="ag-empty">🤖 暂无自定义智能体，点击上方按钮创建</div>';
            return;
        }
        var html = '';
        agents.forEach(function(a) {
            var statusColor = a.status === 'online' ? '#52c41a' : '#fa8c16';
            var statusBg = a.status === 'online' ? '#f6ffed' : '#fff7e6';
            var statusLabel = a.status === 'online' ? '🟢 在线' : '⏸️ 暂停';
            var styleLabels = { professional:'严谨专业', concise:'简洁高效', data:'数据分析', friendly:'友善亲和' };
            var capsHtml = (a.capabilities || []).map(function() { return '<span class="ag-card-bind-tag">🔧 能力</span>'; }).join('');
            var kbHtml = (a.knowledgeBases || []).map(function() { return '<span class="ag-card-bind-tag">📚 知识</span>'; }).join('');
            
            html += '<div class="ag-card">' +
                '<div class="ag-card-header">' +
                    '<div class="ag-card-icon">' + a.icon + '</div>' +
                    '<div class="ag-card-info">' +
                        '<div class="ag-card-name">' + a.name + '</div>' +
                        '<div class="ag-card-meta-line">' +
                            '<span style="color:' + statusColor + '">' + statusLabel + '</span>' +
                            '<span>·</span><span>' + (styleLabels[a.style] || a.style) + '</span>' +
                            '<span>·</span><span>' + a.model + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="ag-card-body">' + a.description + '</div>' +
                '<div class="ag-card-binds">' + capsHtml + kbHtml + '</div>' +
                '<div class="ag-card-stats">' +
                    '<span>💬 总对话: ' + (a.stats ? a.stats.totalConversations || 0 : 0) + '</span>' +
                    '<span>📅 今日: ' + (a.stats ? a.stats.todayConversations || 0 : 0) + '</span>' +
                    (a.stats && a.stats.lastActiveAt ? '<span>⏰ ' + a.stats.lastActiveAt.slice(0,10) + '</span>' : '') +
                '</div>' +
                '<div class="ag-card-actions">' +
                    '<button class="ag-card-action" onclick="showAgentEditForm(\'' + a.id + '\')">📝 编辑</button>' +
                    '<button class="ag-card-action ' + (a.status === 'online' ? '' : 'primary') + '" onclick="toggleAgentStatus(\'' + a.id + '\')">' + (a.status === 'online' ? '⏸ 暂停' : '▶ 恢复') + '</button>' +
                    '<button class="ag-card-action danger" onclick="deleteManagedAgent(\'' + a.id + '\')">🗑 删除</button>' +
                '</div>' +
            '</div>';
        });
        document.getElementById('agGrid').innerHTML = html;
    });
}

function showAgentCreateForm() {
    showAgentForm(null);
}

function showAgentEditForm(agentId) {
    fetch('/api/managed-agents').then(function(r) { return r.json(); }).then(function(agents) {
        var a = agents.find(function(x) { return x.id === agentId; });
        if (a) showAgentForm(a);
    });
}

function showAgentForm(agent) {
    var isEdit = !!agent;
    var title = isEdit ? '编辑智能体' : '创建智能体';
    var n = agent || { name:'', description:'', icon:'🤖', style:'professional', capabilities:[], knowledgeBases:[], model:'Claude 4', temperature:0.3, proactiveSettings:{dailyBriefing:{enabled:false,time:'08:30'},emergencyAlert:{enabled:false}} };
    
    var styleOpts = ['professional','concise','data','friendly'].map(function(s) {
        var labels = { professional:'严谨专业', concise:'简洁高效', data:'数据分析', friendly:'友善亲和' };
        return '<option value="' + s + '"' + (s === n.style ? ' selected' : '') + '>' + labels[s] + '</option>';
    }).join('');
    
    var capsOpts = '';
    fetch('/api/capabilities').then(function(r) { return r.json(); }).then(function(caps) {
        capsOpts = caps.map(function(c) {
            var selected = (n.capabilities || []).indexOf(c.id) >= 0;
            return '<span class="tag-opt' + (selected ? ' selected' : '') + '" data-id="' + c.id + '" onclick="this.classList.toggle(\'selected\')">' + c.icon + ' ' + c.name + '</span>';
        }).join('');
        
        var kbOpts = '';
        fetch('/api/kb/categories').then(function(r) { return r.json(); }).then(function(kbs) {
            kbOpts = kbs.map(function(k) {
                var selected = (n.knowledgeBases || []).indexOf(k.id) >= 0;
                return '<span class="tag-opt' + (selected ? ' selected' : '') + '" data-id="' + k.id + '" onclick="this.classList.toggle(\'selected\')">' + (k.icon || '📁') + ' ' + k.name + '</span>';
            }).join('');
            
            var body = '<label>智能体名称</label><input type="text" id="agFormName" value="' + n.name + '" placeholder="如：税务合规助手">' +
                '<label>角色描述</label><textarea id="agFormDesc" placeholder="你是一名..." style="min-height:50px;">' + n.description + '</textarea>' +
                '<div class="form-row"><div><label>回复风格</label><select id="agFormStyle">' + styleOpts + '</select></div>' +
                '<div><label>模型选择</label><select id="agFormModel"><option' + (n.model === 'Claude 4' ? ' selected' : '') + '>Claude 4</option><option' + (n.model === 'GPT-4o' ? ' selected' : '') + '>GPT-4o</option><option' + (n.model === 'Gemini 2.5' ? ' selected' : '') + '>Gemini 2.5</option></select></div></div>' +
                '<label>绑定能力</label><div class="tag-select" id="agFormCaps">' + (capsOpts || '<span class="form-hint">暂无可用能力</span>') + '</div>' +
                '<label>绑定知识库</label><div class="tag-select" id="agFormKBs">' + (kbOpts || '<span class="form-hint">暂无知识库</span>') + '</div>' +
                '<label style="margin-top:10px;">主动推送</label>' +
                '<div style="display:flex;gap:12px;">' +
                    '<label style="font-weight:400;display:flex;align-items:center;gap:4px;margin:0;"><input type="checkbox" id="agFormDaily"' + (n.proactiveSettings && n.proactiveSettings.dailyBriefing && n.proactiveSettings.dailyBriefing.enabled ? ' checked' : '') + '> 每日简报 (08:30)</label>' +
                    '<label style="font-weight:400;display:flex;align-items:center;gap:4px;margin:0;"><input type="checkbox" id="agFormAlert"' + (n.proactiveSettings && n.proactiveSettings.emergencyAlert && n.proactiveSettings.emergencyAlert.enabled ? ' checked' : '') + '> 紧急预警</label>' +
                '</div>';
            
            showModal(title, body, function() {
                var caps = [];
                document.querySelectorAll('#agFormCaps .tag-opt.selected').forEach(function(el) {
                    caps.push(el.getAttribute('data-id'));
                });
                var kbs = [];
                document.querySelectorAll('#agFormKBs .tag-opt.selected').forEach(function(el) {
                    kbs.push(el.getAttribute('data-id'));
                });
                
                var payload = {
                    name: document.getElementById('agFormName').value,
                    description: document.getElementById('agFormDesc').value,
                    icon: n.icon || '🤖',
                    style: document.getElementById('agFormStyle').value,
                    model: document.getElementById('agFormModel').value,
                    temperature: 0.3,
                    capabilities: caps,
                    knowledgeBases: kbs,
                    proactiveSettings: {
                        dailyBriefing: { enabled: document.getElementById('agFormDaily').checked, time: '08:30' },
                        emergencyAlert: { enabled: document.getElementById('agFormAlert').checked },
                    },
                };
                
                if (isEdit) {
                    fetch('/api/managed-agents/' + agent.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
                        .then(function() { closeModal(); loadManagedAgents(); });
                } else {
                    fetch('/api/managed-agents', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
                        .then(function() { closeModal(); loadManagedAgents(); });
                }
            });
        });
    });
}

function toggleAgentStatus(agentId) {
    fetch('/api/managed-agents/' + agentId + '/toggle-status', { method:'POST' })
        .then(function() { loadManagedAgents(); });
}

function deleteManagedAgent(agentId) {
    if (!confirm('确认删除此智能体？')) return;
    fetch('/api/managed-agents/' + agentId, { method:'DELETE' })
        .then(function() { loadManagedAgents(); });
}

// ========================================
// Modal Utility
// ========================================
function showModal(title, bodyHtml, onSave, saveLabel) {
    closeModal();
    var overlay = document.createElement('div');
    overlay.className = 'tv-modal-overlay';
    overlay.id = 'tvModal';
    overlay.onclick = function(e) { if (e.target === this) closeModal(); };
    
    var footerBtns = '';
    if (onSave) {
        footerBtns = '<button class="tv-btn default" onclick="closeModal()">取消</button><button class="tv-btn primary" id="modalSaveBtn">' + (saveLabel || '💾 保存') + '</button>';
    } else {
        footerBtns = '<button class="tv-btn primary" onclick="closeModal()">' + (saveLabel || '关闭') + '</button>';
    }
    
    overlay.innerHTML = '<div class="tv-modal">' +
        '<div class="tv-modal-header"><div class="tv-modal-title">' + title + '</div><button class="tv-modal-close" onclick="closeModal()">✕</button></div>' +
        '<div class="tv-modal-body">' + bodyHtml + '</div>' +
        '<div class="tv-modal-footer">' + footerBtns + '</div>' +
    '</div>';
    document.body.appendChild(overlay);
    
    if (onSave) {
        document.getElementById('modalSaveBtn').onclick = onSave;
    }
}

function closeModal() {
    var el = document.getElementById('tvModal');
    if (el) el.remove();
}
</script>
</body>
</html>
